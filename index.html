<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Bill Splitter</title>
  <style>
    /* ==== Reset & Global ==== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e2f;
      min-height: 100vh;
      padding: 20px;
      color: #f4f4f4;
      line-height: 1.5;
    }
    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 30px;
      font-size: 2.4rem;
      font-weight: 700;
    }

    /* ==== Layout ==== */
    .container { max-width: 1100px; margin: 0 auto; }
    .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }

    /* ==== Cards ==== */
    .card {
      background: #2b2b3c;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.4);
    }
    .card h2 { margin-bottom: 20px; font-size: 1.3rem; color: #ffdd57; }

    /* ==== Forms ==== */
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; color: #ddd; }
    input, select {
      width: 100%; padding: 12px;
      border: 2px solid #444; border-radius: 8px;
      font-size: 15px; background: #1e1e2f; color: #f4f4f4;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #ffdd57; outline: none; }
    .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
    .checkbox-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9rem; }

    /* ==== Buttons ==== */
    button {
      display: inline-block; width: 100%; padding: 12px;
      background: #ffdd57; color: #1e1e2f;
      border: none; border-radius: 8px;
      font-size: 16px; font-weight: 600;
      cursor: pointer; transition: 0.3s;
    }
    button:hover { background: #ffd633; }

    .delete-btn {
      background: #e74c3c; padding: 6px 12px; font-size: 0.85em;
      border-radius: 5px; cursor: pointer; color: #fff;
      border: none; transition: 0.3s;
    }
    .delete-btn:hover { background: #c0392b; }

    /* ==== Bills List ==== */
    .bills-container { max-height: 400px; overflow-y: auto; }
    .empty-state { text-align: center; color: #aaa; padding: 30px; }
    .bill-item {
      background: #3a3a4f;
      border-radius: 8px;
      padding: 15px; margin-bottom: 12px;
      transition: 0.3s;
    }
    .bill-item:hover { background: #44445c; }
    .bill-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .bill-name { font-weight: 600; font-size: 1.1em; color: #ffdd57; margin-bottom: 6px; }
    .bill-amount { color: #bbb; font-size: 0.9em; }
    .bill-split {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .split-tag {
      background: #555;
      color: #fff;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.8em;
    }

    /* ==== Balances ==== */
    .balance-grid { display: grid; gap: 15px; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
    .balance-card {
      background: #3a3a4f; border: 2px solid #555;
      border-radius: 8px; padding: 15px; text-align: center;
    }
    .balance-name { font-size: 1em; margin-bottom: 6px; color: #ddd; font-weight: 500; }
    .balance-amount { font-size: 1.5em; font-weight: bold; margin-bottom: 4px; }
    .positive { color: #2ecc71; }
    .negative { color: #e74c3c; }
    .zero { color: #95a5a6; }
    .balance-status { font-size: 0.85em; color: #bbb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Grocery Bill Splitter 🛒</h1>

    <div class="grid">
      <!-- Add Grocery Bill -->
      <div class="card">
        <h2>Add Grocery Item</h2>
        <div class="form-group">
          <label for="billName">Item Name</label>
          <input type="text" id="billName" placeholder="e.g., Apples, Milk">
        </div>
        <div class="form-group">
          <label for="billAmount">Cost ($)</label>
          <input type="number" id="billAmount" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
          <label for="paidBy">Bought By</label>
          <select id="paidBy"></select>
        </div>
        <div class="form-group">
          <label>Shared With</label>
          <div class="checkbox-grid" id="splitWith"></div>
        </div>
        <button id="addBtn">Add Item</button>
      </div>

      <!-- Bills List -->
      <div class="card">
        <h2>Grocery Items</h2>
        <div class="bills-container" id="billsList">
          <div class="empty-state">No items added yet</div>
        </div>
      </div>
    </div>

    <!-- Balances -->
    <div class="card">
      <h2>Balance Summary</h2>
      <div class="balance-grid" id="balances"></div>
    </div>
  </div>

  <script>
    const people = ['Shaamalan','Stenly','Rentap','Max','Jack','Authur','Hans'];
    let bills = [];

    const paidBySelect = document.getElementById('paidBy');
    const splitWithContainer = document.getElementById('splitWith');

    // Init dropdown & checkboxes
    function initUI() {
      paidBySelect.innerHTML = people.map(p => `<option value="${p}">${p}</option>`).join('');
      splitWithContainer.innerHTML = people.map(p => `
        <label class="checkbox-label">
          <input type="checkbox" value="${p}" checked> ${p}
        </label>
      `).join('');
    }

    // Add grocery item
    function addBill() {
      const name = document.getElementById('billName').value.trim();
      const amount = parseFloat(document.getElementById('billAmount').value);
      const paidBy = paidBySelect.value;
      const checkboxes = splitWithContainer.querySelectorAll('input[type="checkbox"]');

      if (!name || isNaN(amount) || amount <= 0) {
        return alert('Enter a valid item and cost');
      }

      const splitWith = {};
      checkboxes.forEach(cb => splitWith[cb.value] = cb.checked);
      if (!Object.values(splitWith).some(Boolean)) {
        return alert('Select at least one person to share the item');
      }

      bills.push({ id: Date.now(), name, amount, paidBy, splitWith });

      // Reset form
      document.getElementById('billName').value = '';
      document.getElementById('billAmount').value = '';
      checkboxes.forEach(cb => cb.checked = true);

      updateDisplay();
    }

    // Remove item
    function removeBill(id) {
      bills = bills.filter(b => b.id !== id);
      updateDisplay();
    }

    // Calculate balances
    function calculateBalances() {
      const balances = Object.fromEntries(people.map(p => [p, 0]));
      bills.forEach(bill => {
        const participants = Object.entries(bill.splitWith).filter(([_,v]) => v).map(([p]) => p);
        const share = bill.amount / participants.length;
        participants.forEach(p => balances[p] -= share);
        balances[bill.paidBy] += bill.amount;
      });
      return balances;
    }

    // Render UI
    function updateDisplay() {
      const billsList = document.getElementById('billsList');
      if (bills.length === 0) {
        billsList.innerHTML = `<div class="empty-state">No items added yet</div>`;
      } else {
        billsList.innerHTML = bills.map(bill => {
          const splitTags = Object.entries(bill.splitWith)
            .filter(([_, v]) => v)
            .map(([p]) => `<span class="split-tag">${p}</span>`)
            .join('');
          return `
            <div class="bill-item">
              <div class="bill-header">
                <div>
                  <div class="bill-name">${bill.name}</div>
                  <div class="bill-amount">$${bill.amount.toFixed(2)} bought by ${bill.paidBy}</div>
                  <div class="bill-split">Shared with: ${splitTags}</div>
                </div>
                <button class="delete-btn" onclick="removeBill(${bill.id})">Delete</button>
              </div>
            </div>
          `;
        }).join('');
      }

      const balances = calculateBalances();
      document.getElementById('balances').innerHTML = people.map(p => {
        const amount = balances[p];
        const status = amount > 0 ? 'Should receive' : amount < 0 ? 'Should pay' : 'Even';
        const className = amount > 0 ? 'positive' : amount < 0 ? 'negative' : 'zero';
        return `
          <div class="balance-card">
            <div class="balance-name">${p}</div>
            <div class="balance-amount ${className}">${amount >= 0 ? '+' : ''}${amount.toFixed(2)}</div>
            <div class="balance-status">${status}</div>
          </div>
        `;
      }).join('');
    }

    // Init
    document.getElementById('addBtn').addEventListener('click', addBill);
    initUI();
    updateDisplay();
  </script>
</body>
</html>
